# GitHub Pages config

# Enable Jekyll processing (if needed)
# We're using 11ty, so we can skip Jekyll
plugins:
  - jekyll-sitemap
  - jekyll-seo-tag

# Exclude files from GitHub Pages build
exclude:
  - node_modules/
  - package.json
  - package-lock.json
  - .eleventy.js
  - src/
  - cloudcannon.config.yml
