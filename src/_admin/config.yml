backend:
  name: github
  repo: kpserhiiliashko-blip/kp-web
  branch: main
editor:
  preview: false
media_folder: 'src/_assets/uploads'
public_folder: 'assets/uploads'
site_url: https://kpserhiiliashko-blip.github.io/kp-web/

collections:
  - name: 'news'
    label: 'Новини'
    folder: 'src/content/news'
    create: true
    slug: '{{year}}-{{month}}-{{day}}-{{slug}}'
    extension: 'md'
    fields:
      - {
          label: 'Layout',
          name: 'layout',
          widget: 'hidden',
          default: 'post.njk',
        }
      - { label: 'Заголовок', name: 'title', widget: 'string' }
      - {
          label: 'Дата',
          name: 'date',
          widget: 'datetime',
          format: 'YYYY-MM-DD',
        }
      - { label: 'Анонс', name: 'excerpt', widget: 'text', required: false }
      - { label: 'Текст', name: 'body', widget: 'markdown' }
  - name: 'documents'
    label: 'Документи'
    folder: 'src/content/documents'
    create: true
    slug: '{{year}}-{{month}}-{{day}}-{{slug}}'
    extension: 'md'
    fields:
      - { label: 'Назва', name: 'title', widget: 'string' }
      - { label: 'Опис', name: 'body' }
      - label: 'Тип / Емодзі'
        name: 'emoji'
        widget: 'select'
        options:
          - label: 'Документ 📄'
            value: '📄'
          - label: 'Таблиця 📊'
            value: '📊'
          - label: 'Звіт 📋'
            value: '📋'
          - label: 'Файл 📁'
            value: '📁'
          - label: 'Замок 🔒'
            value: '🔒'
          - label: 'PDF 📕'
            value: '📕'
          - label: 'Книга 📖'
            value: '📖'
          - label: 'Чек ✅'
            value: '✅'
      - { label: 'Файл', name: 'file', widget: 'file' }
  - name: 'services'
    label: 'Послуги'
    folder: 'src/content/services'
    create: true
    slug: '{{slug}}'
    extension: 'md'
    fields:
      - { label: 'Назва', name: 'name', widget: 'string' }
      - label: 'Іконка'
        name: 'icon'
        widget: 'select'
        options:
          - { label: '💧 Вода', value: '💧' }
          - { label: '🔄 Циркуляція', value: '🔄' }
          - { label: '♻️ Сміття', value: '♻️' }
          - { label: '🚛 Асенізатор', value: '🚛' }
          - { label: '🏢 Будинок', value: '🏢' }
      - { label: 'Опис', name: 'description', widget: 'text' }
  - name: 'tariffs'
    label: 'Тарифи'
    folder: 'src/content/tariffs'
    create: true
    slug: '{{slug}}'
    extension: 'md'
    fields:
      - { label: 'Назва', name: 'name', widget: 'string' }
      - { label: 'Ціна', name: 'price', widget: 'string' }
      - { label: 'Одиниця', name: 'unit', widget: 'string' }
      - label: 'Категорія'
        name: 'category'
        widget: 'select'
        options:
          - { label: 'Водопостачання та каналізація', value: 'water' }
          - { label: 'Гаряча вода', value: 'hot' }
