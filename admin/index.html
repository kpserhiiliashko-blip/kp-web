<!doctype html>
<html lang="uk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Netlify CMS — Редактор</title>
    <style>
      body {
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
        margin: 0;
      }
      .cms-fallback {
        padding: 2rem;
        color: #333;
        background: #f4f4f4;
        min-height: 100vh;
      }
      .cms-fallback a {
        color: #0066cc;
      }
      @media (max-width: 768px) {
        body {
          font-size: 16px;
        }
        #cms-root {
          min-height: 100vh;
        }
        .nc-appHeader,
        .nc-app-header,
        [data-testid='app-header'] {
          position: sticky !important;
          top: 0;
          z-index: 20;
        }
        .nc-entryEditor-header,
        .nc-entry-editor-header,
        [data-testid='editor-toolbar'] {
          position: sticky !important;
          top: 48px;
          z-index: 19;
        }
      }
    </style>
  </head>
  <body>
    <!-- <div id="cms-root"></div> -->
    <a
      href="/"
      style="
        text-decoration: underline;
        position: fixed;
        bottom: 1rem;
        left: 1rem;
        z-index: 1000;
        color: #0066cc;
      "
      >Повернутися на сайт</a
    >
    <script src="https://unpkg.com/decap-cms@^3/dist/decap-cms.js"></script>
  </body>
</html>
