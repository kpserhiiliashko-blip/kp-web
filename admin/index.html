<!doctype html>
<html lang="uk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Netlify CMS — Редактор новин</title>
    <style>
      body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; }
      .cms-fallback { padding: 2rem; color: #333; background: #f4f4f4; min-height: 100vh; }
      .cms-fallback a { color: #0066cc; }
    </style>
  </head>
  <body>
    <div id="cms-root"></div>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <script src="https://unpkg.com/decap-cms@^3/dist/decap-cms.js"></script>
    <script>
      if (!window.CMS) {
        document.body.innerHTML = '<div class="cms-fallback"><h1>Не вдалося завантажити Netlify CMS</h1><p>Перевір, будь ласка, що:</p><ul><li>сайт розгорнутий на Netlify;</li><li>файл <code>/admin/config.yml</code> доступний;</li><li>в Netlify увімкнено Identity та Git Gateway.</li></ul></div>';
      }

      if (window.netlifyIdentity) {
        window.netlifyIdentity.on("init", function(user) {
          if (!user) {
            window.netlifyIdentity.on("login", function() {
              document.location.href = "/admin/";
            });
          }
        });
      }
    </script>
  </body>
</html>
